<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>all_daily_category_lines</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Arial, sans-serif;
    }

    #vis {
      width: 100%;
      height: 100%;
    }

    .vega-embed,
    .vega-embed summary,
    .vega-embed details,
    .vega-embed > div {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="vis"></div>

  <script>
    vegaEmbed("#vis", "all_daily_category_lines.json", {
      actions: false,
      renderer: "svg"
    });
  </script>
</body>
</html>
