<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@5.20.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}, "autosize": {"contains": "padding", "type": "fit"}}, "data": {"name": "data-82f092182822c6c4b3eb9e09baadbe94"}, "mark": {"type": "bar"}, "encoding": {"tooltip": [{"field": "Amount", "format": "$,.2f", "title": "Amount", "type": "quantitative"}], "x": {"axis": {"labelAngle": 360}, "field": "Year", "type": "nominal"}, "y": {"field": "Amount", "title": "Amount ($)", "type": "quantitative"}}, "height": 600, "title": "Money Earned in Each of the Years 2023-2026", "width": 600, "$schema": "https://vega.github.io/schema/vega-lite/v5.20.1.json", "datasets": {"data-82f092182822c6c4b3eb9e09baadbe94": [{"Year": "2023", "Amount": 756.35}, {"Year": "2024", "Amount": 9444.53}, {"Year": "2025", "Amount": 24267.75}, {"Year": "2026", "Amount": 6208.99}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
